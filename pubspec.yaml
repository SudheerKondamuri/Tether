name: tether
description: "Tether — Linux-Android ecosystem utility for developers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Database (SQLite via Drift)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.5
  path: ^1.9.0

  # Networking & Discovery
  bonsoir: ^5.1.0

  # HTTP server (file serving)
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # QR codes
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2

  # Permissions (Android)
  permission_handler: ^11.3.1

  # Utilities
  uuid: ^4.5.1
  crypto: ^3.0.6
  collection: ^1.19.0
  intl: ^0.19.0
  file_picker: ^8.0.3

  # Crypto for TLS cert generation (pure Dart)
  pointycastle: ^3.9.1
  asn1lib: ^1.5.8
  pem: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
